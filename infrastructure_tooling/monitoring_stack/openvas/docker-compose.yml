services:
  # ---------- Data Feed Containers ----------
  vulnerability-tests:
    image: registry.community.greenbone.net/community/vulnerability-tests
    environment:
      STORAGE_PATH: /var/lib/openvas/22.04/vt-data/nasl
    volumes:
      - vt_data_vol:/mnt

  notus-data:
    image: registry.community.greenbone.net/community/notus-data
    volumes:
      - notus_data_vol:/mnt

  scap-data:
    image: registry.community.greenbone.net/community/scap-data
    volumes:
      - scap_data_vol:/mnt

  cert-bund-data:
    image: registry.community.greenbone.net/community/cert-bund-data
    volumes:
      - cert_data_vol:/mnt

  dfn-cert-data:
    image: registry.community.greenbone.net/community/dfn-cert-data
    volumes:
      - cert_data_vol:/mnt

  data-objects:
    image: registry.community.greenbone.net/community/data-objects
    volumes:
      - data_objects_vol:/mnt

  report-formats:
    image: registry.community.greenbone.net/community/report-formats
    volumes:
      - data_objects_vol:/mnt

  gpg-data:
    image: registry.community.greenbone.net/community/gpg-data
    volumes:
      - gpg_data_vol:/mnt

  # ---------- Core Infrastructure ----------
  redis-server:
    image: registry.community.greenbone.net/community/redis-server
    restart: on-failure
    volumes:
      - redis_socket_vol:/run/redis/

  pg-gvm:
    image: registry.community.greenbone.net/community/pg-gvm
    restart: on-failure
    volumes:
      - psql_data_vol:/var/lib/postgresql
      - psql_socket_vol:/var/run/postgresql

  pg-gvm-migrator:
    image: registry.community.greenbone.net/community/pg-gvm
    restart: on-failure
    volumes:
      - psql_data_vol:/var/lib/postgresql
      - psql_socket_vol:/var/run/postgresql
    depends_on:
      pg-gvm:
        condition: service_started

  # ---------- Scanning Services ----------
  gvmd:
    image: registry.community.greenbone.net/community/gvmd
    restart: on-failure
    volumes:
      - gvmd_data_vol:/var/lib/gvm
      - scap_data_vol:/var/lib/gvm/scap-data/
      - cert_data_vol:/var/lib/gvm/cert-data
      - data_objects_vol:/var/lib/gvm/data-objects/gvmd
      - vt_data_vol:/var/lib/openvas/plugins
      - psql_socket_vol:/var/run/postgresql
      - gvmd_socket_vol:/run/gvmd
      - ospd_openvas_socket_vol:/run/ospd
      - gpg_data_vol:/etc/openvas/gnupg
    depends_on:
      pg-gvm-migrator:
        condition: service_completed_successfully

  ospd-openvas:
    image: registry.community.greenbone.net/community/ospd-openvas
    restart: on-failure
    hostname: ospd-openvas.local
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor=unconfined
    command:
      [
        "ospd-openvas",
        "-f",
        "--config",
        "/etc/gvm/ospd-openvas.conf",
        "--mqtt-broker-address",
        "mqtt-broker",
        "--notus-feed-dir",
        "/var/lib/notus/advisories",
        "-m",
        "666",
      ]
    volumes:
      - gpg_data_vol:/etc/openvas/gnupg
      - vt_data_vol:/var/lib/openvas/plugins
      - notus_data_vol:/var/lib/notus
      - ospd_openvas_socket_vol:/run/ospd
      - redis_socket_vol:/run/redis/
    depends_on:
      redis-server:
        condition: service_started
      gpg-data:
        condition: service_completed_successfully
      vulnerability-tests:
        condition: service_completed_successfully

  openvasd:
    image: registry.community.greenbone.net/community/openvas-scanner
    restart: on-failure
    environment:
      OPENVASD_MOD: service_notus
      GNUPGHOME: /etc/openvas/gnupg
      LISTENING: "0.0.0.0:3000"
    volumes:
      - openvasd_vol:/etc/openvasd
      - gpg_data_vol:/etc/openvas/gnupg
      - notus_data_vol:/var/lib/notus
    depends_on:
      gpg-data:
        condition: service_completed_successfully
      notus-data:
        condition: service_completed_successfully

  configure-openvas:
    image: registry.community.greenbone.net/community/openvas-scanner
    volumes:
      - openvasd_vol:/etc/openvasd
    command: >
      /bin/sh -c "test -f /etc/openvasd/tls/server.pem && exit 0;
      mkdir -p /etc/openvasd/tls;
      openssl req -x509 -newkey rsa:4096 -keyout /etc/openvasd/tls/key.pem
      -out /etc/openvasd/tls/server.pem -nodes -days 3650
      -subj '/CN=openvasd'"
    depends_on:
      openvasd:
        condition: service_started

  mqtt-broker:
    image: greenbone/mqtt-broker
    restart: on-failure
    networks:
      default:
        aliases:
          - mqtt-broker
          - broker

  # ---------- Web Frontend ----------
  gsa:
    image: registry.community.greenbone.net/community/gsa
    restart: on-failure
    volumes:
      - gsa_vol:/usr/share/gvm/gsad/web/
    depends_on:
      - gsad

  gsad:
    image: registry.community.greenbone.net/community/gsad
    restart: on-failure
    command:
      [
        "gsad",
        "-f",
        "--http-only",
        "--no-redirect",
        "--port=9392",
      ]
    volumes:
      - gsa_vol:/usr/share/gvm/gsad/web/
      - gvmd_socket_vol:/run/gvmd
    depends_on:
      gvmd:
        condition: service_started

  # ---------- Utilities ----------
  gvm-tools:
    image: registry.community.greenbone.net/community/gvm-tools
    volumes:
      - gvmd_socket_vol:/run/gvmd
      - ospd_openvas_socket_vol:/run/ospd
    depends_on:
      gvmd:
        condition: service_started

volumes:
  vt_data_vol:
  notus_data_vol:
  scap_data_vol:
  cert_data_vol:
  data_objects_vol:
  gpg_data_vol:
  redis_socket_vol:
  psql_data_vol:
  psql_socket_vol:
  gvmd_data_vol:
  gvmd_socket_vol:
  ospd_openvas_socket_vol:
  openvasd_vol:
  gsa_vol:
